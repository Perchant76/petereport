version: '3.8'
services:
  petereport:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: petereport_django
    container_name: petereport_django
    command: >
      bash -c "
      sleep 1 &&
      pipenv install --deploy --ignore-pipfile --python 3.9 &&
      pip freeze &&
      pipenv run python ./manage.py makemigrations
      pipenv run python ./manage.py migrate
      pipenv run python ./manage.py loaddata ./config/cwe-list.json
      pipenv run python ./manage.py loaddata ./config/owasp-list.json
      pipenv run gunicorn --chdir ./app petereport.wsgi:application --timeout 120 --graceful-timeout 60 --bind 0.0.0.0:8000
      "
    volumes:
      - '.:/opt/petereport'
    expose:
      - 8000
    restart: unless-stopped
